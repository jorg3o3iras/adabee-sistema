<script>
// ═══════════════════════════════ STATE ═══════════════════════════════
let loginType='admin', camStream=null, camFacing='environment';
let delTarget=null;
const API_URL = ''; // Deixe vazio para usar o mesmo servidor

// ═══════════════════════════════ LOGIN ═══════════════════════════════
function setLTab(t){
  loginType=t;
  document.querySelectorAll('.login-tab').forEach((el,i)=>el.classList.toggle('active',(i===0&&t==='admin')||(i===1&&t==='user')));
}

async function doLogin(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value.trim();
  
  try {
    const response = await fetch(`${API_URL}/api/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, senha: p })
    });
    const data = await response.json();
    
    if (data.sucesso) {
      startApp(data.perfil, data.usuario);
    } else {
      showToast('❌ Usuário ou senha incorretos!', 'error');
      shakeCard();
    }
  } catch (erro) {
    showToast('❌ Erro ao conectar ao servidor!', 'error');
    console.error(erro);
  }
}

function shakeCard(){ const c=document.querySelector('.login-card'); c.style.animation='none'; setTimeout(()=>c.style.animation='shake .4s ease',10); }
document.getElementById('lp').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

function startApp(role,uname){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('sb-avatar').textContent=uname[0].toUpperCase();
  document.getElementById('sb-uname').textContent=uname;
  document.getElementById('sb-urole').textContent=role==='admin'?'Administrador do Sistema':'Usuário do Sistema';
  const isAdmin=role==='admin';
  document.getElementById('adm-sb').style.display=isAdmin?'block':'none';
  document.getElementById('usr-sb').style.display=isAdmin?'none':'block';
  go(isAdmin?'dashboard':'u-dashboard');
  buildGabGrid();
  carregarDados(); // Carrega todos os dados do banco
}

function doLogout(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('lu').value=''; document.getElementById('lp').value='';
  fecharCamera();
}

// ═══════════════════════════════ CARREGAR DADOS DO BANCO ═══════════════════════════════
async function carregarDados() {
  await Promise.all([
    carregarEscolas(),
    carregarTurmas(),
    carregarAlunos(),
    carregarProvas(),
    carregarDashboard(),
    carregarHistorico(),
    carregarComboEscolas(),
    carregarComboTurmas(),
    carregarComboAlunos(),
    carregarComboProvas()
  ]);
}

// ═══════════════════════════════ NAV ═══════════════════════════════
function go(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const el=document.getElementById('page-'+page);
  if(el) el.classList.add('active');
  document.querySelectorAll('.sb-item').forEach(s=>s.classList.toggle('active',s.dataset.p===page));
  
  // Recarregar dados ao navegar
  if (page === 'escola') carregarEscolas();
  if (page === 'turmas') carregarTurmas();
  if (page === 'alunos') carregarAlunos();
  if (page === 'provas') carregarProvas();
  if (page === 'dashboard') carregarDashboard();
  if (page === 'resultados') carregarHistorico();
}

// ═══════════════════════════════ ESCOLAS ═══════════════════════════════
async function carregarEscolas() {
  try {
    const response = await fetch(`${API_URL}/api/escolas`);
    const escolas = await response.json();
    const tbody = document.getElementById('tb-escola');
    if (!tbody) return;
    
    if (escolas.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:30px;">Nenhuma escola cadastrada</td></tr>`;
    } else {
      tbody.innerHTML = escolas.map((escola, index) => `
        <tr data-id="${escola.id}" data-nome="${escola.nome}">
          <td><span class="badge badge-blue">${String(index+1).padStart(3,'0')}</span></td>
          <td><strong>${escola.nome}</strong></td>
          <td>${escola.municipio || '—'}${escola.estado ? ' — ' + escola.estado : ''}</td>
          <td><span class="chip">${escola.inep || '—'}</span></td>
          <td>${escola.diretor || '—'}</td>
          <td>0</td>
          <td>0</td>
          <td><div class="btn-group">
            <button class="btn btn-outline btn-sm" onclick="editarEscola(${escola.id})">✏️ Editar</button>
            <button class="btn-del" onclick="excluirEscola(${escola.id}, '${escola.nome}')" title="Excluir">🗑️</button>
          </div></td>
        </tr>
      `).join('');
    }
  } catch (erro) {
    console.error('Erro ao carregar escolas:', erro);
  }
}

async function excluirEscola(id, nome) {
  if (!confirm(`Excluir a escola "${nome}"? Isso também excluirá todas as turmas e alunos vinculados.`)) return;
  try {
    const response = await fetch(`${API_URL}/api/escolas/${id}`, { method: 'DELETE' });
    if (response.ok) {
      showToast(`🗑️ Escola "${nome}" excluída!`, 'error');
      carregarDados();
    } else {
      const erro = await response.json();
      showToast('Erro: ' + (erro.erro || 'Erro desconhecido'), 'error');
    }
  } catch (erro) {
    showToast('Erro ao excluir: ' + erro.message, 'error');
  }
}

function editarEscola(id) {
  showToast(`✏️ Editando escola ID ${id}...`, 'info');
}

        '7º Ano': 'badge-cyan','8º Ano': 'badge-orange','9º Ano': 'badge-orange'

function editarTurma(id) {

// ═══════════════════════════════ DASHBOARD ═══════════════════════════════
async function carregarDashboard() {
  try {
    const response = await fetch(`${API_URL}/api/dashboard`);
    const dados = await response.json();
    
    const cards = document.querySelectorAll('.stat-card');
    if (cards.length >= 4) {
      const valores = [
        dados.total_escolas || 0,
        dados.total_turmas || 0,
        dados.total_alunos || 0,
        dados.total_provas || 0
      ];
      cards.forEach((card, index) => {
        const valDiv = card.querySelector('.stat-val');
        if (valDiv) valDiv.textContent = valores[index] || 0;
      });
    }
    
    // Atualizar total de correções e média
    const totalCorrecoes = document.querySelector('#total-correcoes');
    if (totalCorrecoes) totalCorrecoes.textContent = dados.total_correcoes || 0;
    
    const mediaGeral = document.querySelector('#media-geral');
    if (mediaGeral) mediaGeral.textContent = dados.media_geral || 0;
    
  } catch (erro) {
    console.error('Erro ao carregar dashboard:', erro);
  }
}

// ═══════════════════════════════ HISTÓRICO ═══════════════════════════════
async function carregarHistorico() {
  try {
    const response = await fetch(`${API_URL}/api/historico`);
    const historico = await response.json();
    const tbody = document.querySelector('#page-resultados .table-wrap tbody');
    if (!tbody) return;
    
    if (historico.length === 0 || historico.erro) {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:30px;">Nenhuma correção realizada</td></tr>`;
    } else {
      tbody.innerHTML = historico.map((item, index) => `
        <tr>
          <td>${index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : index+1}</td>
          <td>${index+1}</td>
          <td><strong>${item.aluno_nome}</strong></td>
          <td><span class="badge badge-purple">—</span></td>
          <td>${item.acertos}</td>
          <td><strong style="color:${item.nota >= 6 ? 'var(--green)' : 'var(--red)'};">${item.nota}</strong></td>
          <td><span class="badge ${item.nota >= 6 ? 'badge-green' : 'badge-red'}">${item.nota >= 6 ? 'Aprovado' : 'Reprovado'}</span></td>
        </tr>
      `).join('');
    }
  } catch (erro) {
    console.error('Erro ao carregar histórico:', erro);
  }
}

// ═══════════════════════════════ COMBOS ═══════════════════════════════
async function carregarComboEscolas() {
  try {
    const response = await fetch(`${API_URL}/api/escolas`);
    const escolas = await response.json();
    
    document.querySelectorAll('select').forEach(select => {
      if (select.id && select.id.startsWith('combo-escola-')) {
        const currentValue = select.value;
        select.innerHTML = '<option value="">Selecione a escola</option>';
        escolas.forEach(escola => {
          const option = document.createElement('option');
          option.value = escola.id;
          option.textContent = escola.nome;
          select.appendChild(option);
        });
        if (currentValue) select.value = currentValue;
      }
    });
  } catch (erro) {
    console.error('Erro ao carregar combo de escolas:', erro);
  }
}

// ═══════════════════════════════ MODALS ═══════════════════════════════
function openM(id){ document.getElementById(id).classList.add('show'); }
function closeM(id){ document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('show'); }));

async function saveM(id, msg){
  const modal = document.getElementById(id);
  if (id === 'm-escola') await salvarEscola(modal);
  else if (id === 'm-turma') await salvarTurma(modal);
  else if (id === 'm-aluno') await salvarAluno(modal);
  closeM(id);
  showToast('✅ ' + msg, 'success');
  carregarDados();
}

// ═══════════════════════════════ SALVAR ESCOLA ═══════════════════════════════
async function salvarEscola(modal) {
  const inputs = modal.querySelectorAll('input');
  const selects = modal.querySelectorAll('select');
  
  const dados = {
    nome: inputs[0]?.value.trim(),
    inep: inputs[1]?.value.trim() || '',
    municipio: inputs[2]?.value.trim() || '',
    estado: selects[0]?.value || 'SP',
    telefone: inputs[3]?.value.trim() || '',
    diretor: inputs[4]?.value.trim() || ''
  };
  
  if (!dados.nome) {
    showToast('❌ Nome da escola é obrigatório!', 'error');
    return;
  }
  
  try {
    const response = await fetch(`${API_URL}/api/escolas`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(dados)
    });
    const result = await response.json();
    if (result.id) {
      showToast(`✅ Escola "${dados.nome}" cadastrada!`, 'success');
    } else {
      showToast('❌ Erro ao cadastrar escola', 'error');
    }
  } catch (erro) {
    showToast('❌ Erro: ' + erro.message, 'error');
  }
}

// ═══════════════════════════════ SALVAR TURMA ═══════════════════════════════
async function salvarTurma(modal) {
  const selects = modal.querySelectorAll('select');
  const inputs = modal.querySelectorAll('input');
  
  const dados = {
    escola_id: parseInt(selects[0]?.value) || null,
    nome: inputs[1]?.value.trim(),
    serie: selects[1]?.value || '1º Ano',
    turno: selects[2]?.value || 'Manhã',
    professor: inputs[3]?.value.trim() || '',
    capacidade: parseInt(inputs[4]?.value) || 35,
    ano_letivo: parseInt(inputs[0]?.value) || 2025
  };
  
  if (!dados.escola_id) {
    showToast('❌ Selecione uma escola!', 'error');
    return;
  }
  if (!dados.nome) {
    showToast('❌ Nome da turma é obrigatório!', 'error');
    return;
  }
  
  try {
    const response = await fetch(`${API_URL}/api/turmas`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(dados)
    });
    const result = await response.json();
    if (result.id) {
      showToast(`✅ Turma "${dados.nome}" cadastrada!`, 'success');
    } else {
      showToast('❌ Erro ao cadastrar turma', 'error');
    }
  } catch (erro) {
    showToast('❌ Erro: ' + erro.message, 'error');
  }
}

// ═══════════════════════════════ SALVAR ALUNO ═══════════════════════════════
async function salvarAluno(modal) {
  const inputs = modal.querySelectorAll('input');
  const selects = modal.querySelectorAll('select');
  const textarea = modal.querySelector('textarea');
  
  const dados = {
    numero_chamada: parseInt(inputs[0]?.value) || null,
    matricula: inputs[1]?.value.trim() || '',
    nome: inputs[2]?.value.trim(),
    data_nascimento: inputs[3]?.value || null,
    genero: selects[0]?.value || 'Masculino',
    turma_id: parseInt(selects[3]?.value) || null,
    escola_id: parseInt(selects[4]?.value) || null,
    responsavel: inputs[4]?.value.trim() || '',
    telefone: inputs[5]?.value.trim() || '',
    email: inputs[6]?.value.trim() || '',
    observacoes: textarea?.value.trim() || ''
  };
  
  if (!dados.nome) {
    showToast('❌ Nome do aluno é obrigatório!', 'error');
    return;
  }
  if (!dados.turma_id) {
    showToast('❌ Selecione a turma do aluno!', 'error');
    return;
  }
  
  try {
    const response = await fetch(`${API_URL}/api/alunos`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(dados)
    });
    const result = await response.json();
    if (result.id) {
      showToast(`✅ Aluno "${dados.nome}" cadastrado!`, 'success');
    } else {
      showToast('❌ Erro ao cadastrar aluno', 'error');
    }
  } catch (erro) {
    showToast('❌ Erro: ' + erro.message, 'error');
  }
}

// ═══════════════════════════════ GABARITO ═══════════════════════════════
function buildGabGrid(){
  const grid=document.getElementById('gab-grid'); if(!grid) return;
  const serieEl=document.getElementById('gab-serie');
  const totalEl=document.getElementById('gab-total');
  if(!serieEl||!totalEl) return;
  const is1=(parseInt(serieEl.value)||1)===1;
  const total=parseInt(totalEl.value)||20;
  const alts=is1?['A','B','C']:['A','B','C','D'];
  const cls=is1?'s1y':'s29';
  const lbl=document.getElementById('gab-label');
  if(lbl){ lbl.textContent=is1?'🔵 1º Ano — 3 alternativas: A, B, C':`🟦 ${serieEl.options[serieEl.selectedIndex].text.split('—')[0].trim()} — 4 alternativas: A, B, C, D`; lbl.style.color=is1?'#a78bfa':'var(--blue)'; }
  grid.innerHTML='';
  for(let i=1;i<=total;i++){
    const div=document.createElement('div'); div.className='gab-item';
    div.innerHTML=`<div class="gab-num">Q${i}</div>
      <select class="gab-select ${cls}" onchange="this.classList.toggle('filled',this.value!='')">
        <option value="">—</option>${alts.map(a=>`<option>${a}</option>`).join('')}
      </select>`;
    grid.appendChild(div);
  }
}

function fillGabRand(){
  const is1=(parseInt(document.getElementById('gab-serie')?.value)||1)===1;
  const alts=is1?['A','B','C']:['A','B','C','D'];
  document.querySelectorAll('.gab-select').forEach(s=>{ s.value=alts[Math.floor(Math.random()*alts.length)]; s.classList.add('filled'); });
  showToast('🎲 Gabarito de teste preenchido!');
}

function clearGab(){ document.querySelectorAll('.gab-select').forEach(s=>{ s.value=''; s.classList.remove('filled'); }); }

async function saveGab(){
  const respostas = [];
  document.querySelectorAll('.gab-select').forEach(s => {
    if (s.value) respostas.push(s.value);
  });
  
  if (respostas.length === 0) {
    showToast('⚠️ Preencha o gabarito!', 'error');
    return;
  }
  
  const provaId = document.querySelector('#page-gabarito select')?.value;
  const serie = document.querySelector('#gab-serie')?.value || '1º Ano';
  
  try {
    const response = await fetch(`${API_URL}/api/gabaritos`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prova_id: parseInt(provaId) || 1,
        serie: serie,
        total_questoes: respostas.length,
        alternativas: 'A,B,C,D',
        respostas: respostas,
        pontos_por_acerto: 0.5,
        penalidade: 0,
        questoes_anuladas: ''
      })
    });
    const result = await response.json();
    if (result.id) {
      showToast('✅ Gabarito salvo com sucesso!', 'success');
    } else {
      showToast('❌ Erro ao salvar gabarito', 'error');
    }
  } catch (erro) {
    showToast('❌ Erro: ' + erro.message, 'error');
  }
}

// ═══════════════════════════════ CÂMERA ═══════════════════════════════
async function abrirCamera(){
  document.getElementById('cam-modal').classList.add('show');
  try{
    if(camStream) camStream.getTracks().forEach(t=>t.stop());
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:camFacing,width:{ideal:1280},height:{ideal:720}}});
    document.getElementById('cam-video').srcObject=camStream;
  }catch(e){ showToast('❌ Câmera não disponível: '+e.message,'error'); fecharCamera(); }
}

function trocarCamera(){ camFacing=camFacing==='environment'?'user':'environment'; abrirCamera(); }

function fecharCamera(){
  document.getElementById('cam-modal').classList.remove('show');
  if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
}

function capturarFoto(){
  const vid=document.getElementById('cam-video');
  const canvas=document.getElementById('cam-canvas');
  canvas.width=vid.videoWidth||640; canvas.height=vid.videoHeight||480;
  canvas.getContext('2d').drawImage(vid,0,0);
  const foto = canvas.toDataURL('image/jpeg', 0.9);
  fecharCamera();
  showToast('📸 Foto capturada! Processando com IA...','ai');
  processarComIA(foto);
  go('corrigir-ia');
}

// ═══════════════════════════════ ARQUIVO ═══════════════════════════════
function abrirArquivo(){ document.getElementById('inp-arq')?.click(); }

function processarArq(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const prev=document.getElementById('arq-preview');
    const img=document.getElementById('img-prev');
    if(prev&&img){ prev.style.display='block'; img.src=e.target.result; }
    showToast('📂 Arquivo carregado! Processando...','ai');
    processarComIA(e.target.result);
    go('corrigir-ia');
  };
  reader.readAsDataURL(file);
}

// ═══════════════════════════════ IA CORREÇÃO ═══════════════════════════════
async function processarComIA(imagemBase64) {
  showToast('🤖 IA detectando marcações...', 'ai');
  const box = document.getElementById('ia-result'); 
  if(box) box.style.display = 'none';
  
  // Pegar prova e aluno selecionados
  const provaSelect = document.querySelector('#page-corrigir-ia select');
  const alunoSelect = document.querySelectorAll('#page-corrigir-ia select')[1];
  
  const provaId = provaSelect?.value || 1;
  const alunoId = alunoSelect?.value || 1;
  
  if (!imagemBase64) {
    showToast('❌ Nenhuma imagem para processar!', 'error');
    return;
  }
  
  try {
    const response = await fetch(`${API_URL}/api/corrigir`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        imagem: imagemBase64,
        prova_id: parseInt(provaId),
        aluno_id: parseInt(alunoId)
      })
    });
    
    const dados = await response.json();
    
    if (dados.erro) {
      showToast('❌ ' + dados.erro, 'error');
      return;
    }
    
    // Exibir resultados
    const rd = document.getElementById('ia-resp');
    if (rd) {
      rd.innerHTML = dados.respostas_detectadas.map((a, i) => {
        const ok = a === dados.correcoes[i]?.gabarito;
        return `<span style="background:${ok?'rgba(16,185,129,.2)':'rgba(239,68,68,.2)'};border:1px solid ${ok?'rgba(16,185,129,.4)':'rgba(239,68,68,.4)'};padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;color:${ok?'var(--green)':'var(--red)'};">Q${i+1}:${a}</span>`;
      }).join('');
    }
    
    const cd = document.getElementById('ia-comp');
    if (cd) {
      cd.innerHTML = dados.respostas_detectadas.map((a, i) => {
        const ok = a === dados.correcoes[i]?.gabarito;
        return `<div style="text-align:center;"><div style="font-size:9px;color:var(--text3);margin-bottom:2px;">Q${i+1}</div>
          <div style="background:${ok?'rgba(16,185,129,.2)':'rgba(239,68,68,.2)'};border:1px solid ${ok?'rgba(16,185,129,.4)':'rgba(239,68,68,.4)'};border-radius:6px;padding:4px 2px;font-size:11px;font-weight:800;color:${ok?'var(--green)':'var(--red)'};">${a}</div></div>`;
      }).join('');
    }
    
    const ne = document.getElementById('ia-nota');
    if (ne) ne.textContent = dados.nota;
    
    // Atualizar badge de confiança
    const confBadge = document.querySelector('#ia-result .badge-gray');
    if (confBadge) confBadge.textContent = `${dados.confianca || 0}% conf.`;
    
    if (box) box.style.display = 'block';
    showToast(`✅ ${dados.acertos}/${dados.total} acertos — Nota: ${dados.nota}`, 'success');
    
    // Atualizar dashboard e histórico
    carregarDashboard();
    carregarHistorico();
    
  } catch (erro) {
    showToast('❌ Erro na correção: ' + erro.message, 'error');
    console.error(erro);
  }
}

function prevTexto(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{ document.getElementById('txt-img-prev').style.display='block'; document.getElementById('txt-img').src=e.target.result; };

async function avaliarTexto(){
  const texto = document.getElementById('txt-aluno')?.value;
  const imagem = document.getElementById('txt-img')?.src;
  
  if (!texto && !imagem) {
    showToast('❌ Digite o texto ou selecione uma imagem!', 'error');
    return;
  }
  
  document.getElementById('txt-waiting').style.display='none';
  document.getElementById('txt-loading').style.display='block';
  document.getElementById('txt-res').style.display='none';
  
  const pb=document.getElementById('txt-pb'); let p=0;
  const iv=setInterval(()=>{ p+=Math.random()*12; if(p>100) p=100; if(pb) pb.style.width=p+'%';
    if(p>=100){ clearInterval(iv); 
      try {
        // Enviar para API
        const body = {};
        if (texto) body.texto = texto;
        if (imagem) body.imagem = imagem;
        
        fetch(`${API_URL}/api/corrigir_redacao`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        })
        .then(res => res.json())
        .then(dados => {
          document.getElementById('txt-loading').style.display='none';
          document.getElementById('txt-res').style.display='block';
          
          if (dados.erro) {
            showToast('❌ ' + dados.erro, 'error');
            return;
          }
          
          document.getElementById('txt-nota').textContent = dados.nota || 0;
          document.getElementById('c-coe').textContent = dados.metricas?.nota_coerencia || 0;
          document.getElementById('c-tema').textContent = dados.metricas?.nota_estrutura || 0;
          document.getElementById('c-ort').textContent = dados.metricas?.nota_gramatica || 0;
          document.getElementById('c-voc').textContent = dados.metricas?.nota_vocabulario || 0;
          
          document.getElementById('b-coe').style.width = ((dados.metricas?.nota_coerencia || 0) / 10 * 100) + '%';
          document.getElementById('b-tema').style.width = ((dados.metricas?.nota_estrutura || 0) / 10 * 100) + '%';
          document.getElementById('b-ort').style.width = ((dados.metricas?.nota_gramatica || 0) / 10 * 100) + '%';
          document.getElementById('b-voc').style.width = ((dados.metricas?.nota_vocabulario || 0) / 10 * 100) + '%';
          
          const fb = document.getElementById('txt-fb');
          if (fb) fb.innerHTML = dados.feedback || 'Feedback gerado automaticamente.';
          
          showToast('✅ Avaliação concluída!', 'success');
        })
        .catch(erro => {
          document.getElementById('txt-loading').style.display='none';
          showToast('❌ Erro: ' + erro.message, 'error');
        });
      } catch(erro) {
        document.getElementById('txt-loading').style.display='none';
        showToast('❌ Erro: ' + erro.message, 'error');
      }
    }
  },120);
}

function switchTab(idx,btn){
  btn.closest('.tab-nav').querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  btn.closest('.card').querySelectorAll('.tab-c').forEach((tc,i)=>tc.style.display=i===idx?'block':'none');
}

// ═══════════════════════════════ DELETE ═══════════════════════════════
function excluir(btn, tipo, nome){
  const row=btn.closest('tr');
  delTarget={row, tipo, nome};
  document.getElementById('del-nome-txt').textContent=`"${nome}"`;
  document.getElementById('del-modal').classList.add('show');
}

function cancelarDel(){
  document.getElementById('del-modal').classList.remove('show');
  delTarget=null;
}

function confirmarDel(){
  document.getElementById('del-modal').classList.remove('show');
  if(!delTarget) return;
  const {row, tipo, nome}=delTarget;
  row.classList.add('deleting');
  setTimeout(()=>{
    row.remove();
    showToast(`🗑️ ${tipo.charAt(0).toUpperCase()+tipo.slice(1)} "${nome}" excluído(a).`,'error');
    delTarget=null;
    renumerarTabela(row.closest('tbody'));
  },350);
}

function renumerarTabela(tbody){
  if(!tbody) return;
  tbody.querySelectorAll('tr').forEach((tr,i)=>{
    const badge=tr.querySelector('.badge-blue,.badge-gray');
    if(badge){
      const num=String(i+1).padStart(2,'0');
      if(badge.textContent.match(/^\d+$/)) badge.textContent=num;
    }
  });
}

function editarItem(btn, tipo, nome){ showToast(`✏️ Editando ${tipo}: "${nome}"...`,'info'); }

// ═══════════════════════════════ FILTRAR TABELA ═══════════════════════════════
function filtrarTabela(input, tbodyId){
  const val=input.value.toLowerCase();
  const rows=document.querySelectorAll(`#${tbodyId} tr`);
  rows.forEach(row=>{
    const txt=row.textContent.toLowerCase();
    row.style.display=txt.includes(val)?'':'none';
  });
}

function filtrarSerie(sel){
  const val=sel.value;
  document.querySelectorAll('#tb-turmas tr').forEach(row=>{
    row.style.display=(!val||row.dataset.serie===val)?'':'none';
  });
}

// ═══════════════════════════════ TOAST ═══════════════════════════════
function showToast(msg,type='info'){
  const c=document.getElementById('toast-c');
  const t=document.createElement('div');
  t.className=`toast toast-${type}`;
  const icons={info:'ℹ️',success:'✅',error:'🗑️',ai:'🤖'};
  t.innerHTML=`<span>${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); },3200);
}
